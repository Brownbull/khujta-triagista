<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SRE Triage Agent{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="/" class="logo">&#9889; SRE Triage Agent</a>
            <div class="nav-links">
                <a href="/incidents" class="{% if page == 'list' %}active{% endif %}">Incidents</a>
                <a href="/incidents/new" class="{% if page == 'new' %}active{% endif %}">Report Incident</a>
            </div>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            AgentX Hackathon 2026 &mdash; AI-Powered SRE Incident Triage
        </div>
    </footer>
</body>
</html>
