services:
  app:
    build: .
    ports:
      - "8100:8000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://sre:sre_password@postgres:5432/sre_triage}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - TRIAGE_PROVIDER=${TRIAGE_PROVIDER:-anthropic}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-http://langfuse:3000}
      - OTEL_SERVICE_NAME=sre-triage-agent
      - APP_ENV=${APP_ENV:-development}
      - ECOMMERCE_REPO_PATH=/app/ecommerce-repo
    volumes:
      - ./app:/app/app
      - ./templates:/app/templates
      - ./static:/app/static
      - ./tests:/app/tests
      - uploads:/app/uploads
      - ecommerce-repo:/app/ecommerce-repo:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clone-solidus:
        condition: service_completed_successfully
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sre}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sre_password}
      POSTGRES_DB: ${POSTGRES_DB:-sre_triage}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sre}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  langfuse:
    image: langfuse/langfuse:2
    ports:
      - "3100:3000"
    environment:
      DATABASE_URL: postgresql://${LANGFUSE_POSTGRES_USER:-langfuse}:${LANGFUSE_POSTGRES_PASSWORD:-langfuse_password}@langfuse-db:5432/${LANGFUSE_POSTGRES_DB:-langfuse}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-changeme-in-production}
      SALT: ${SALT:-changeme-in-production}
      NEXTAUTH_URL: http://localhost:3100
      TELEMETRY_ENABLED: "false"
    depends_on:
      langfuse-db:
        condition: service_healthy
    restart: unless-stopped

  langfuse-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse_password
      POSTGRES_DB: langfuse
    volumes:
      - langfuse-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 3s
      retries: 5

  clone-solidus:
    image: alpine:3.20
    volumes:
      - ecommerce-repo:/repo
    command: >
      sh -c "if [ -d /repo/.git ]; then echo 'Solidus already cloned'; else apk add --no-cache git && git clone --depth 1 https://github.com/solidusio/solidus.git /repo; fi"
    restart: "no"

volumes:
  pgdata:
  redisdata:
  langfuse-pgdata:
  uploads:
  ecommerce-repo:
